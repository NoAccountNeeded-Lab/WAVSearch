name: wivwav

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wav
      POSTGRES_PASSWORD: wav
      POSTGRES_DB: wivwav
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wav -d wivwav"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.45.2
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wav_master_key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      # Meilisearch data is not forward-compatible across large engine jumps.
      # Keep the old meilisearch_data volume intact for rollback and rebuild
      # this fresh index from Postgres with the ops "Sync Meilisearch" action.
      - meilisearch_data_v1_45:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    environment:
      DATABASE_URL: postgresql://wav:wav@postgres:5432/wivwav
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://wav:wav@postgres:5432/wivwav
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: wav_master_key
      VALKEY_URL: redis://valkey:6379
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_REQUIRED: ${OLLAMA_REQUIRED:-false}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3002
      CONFIG_ENCRYPTION_SECRET: ${CONFIG_ENCRYPTION_SECRET:-0e1735cf48baa21c71a376a432ebd30b400a118feaecce8ea43f864cf27b2f61}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-41ddf2d6dfad63f18a7fa42d4ddc82da47fd7ac0f9e6c55530078f7c2ca941c2}
      LOG_LEVEL: debug
      # Emit structured JSON so Alloy can parse log fields when --profile obs is active
      LOG_FORMAT: json
      # When running inside Docker, Loki is reachable via the container name, not localhost
      LOKI_URL: http://loki:3100
    depends_on:
      migrate:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: rebuild
          path: ./apps/api/package.json

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://wav:wav@postgres:5432/wivwav
      QUEUE_REDIS_URL: redis://valkey:6379
      SCRAPER_CONCURRENCY: 2
      SCRAPER_HEADLESS: "true"
      # Docker service name resolves automatically — no user config needed
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      LOG_LEVEL: debug
      LOG_FORMAT: json
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/scraper/src
          target: /app/apps/scraper/src
        - action: rebuild
          path: ./apps/scraper/package.json

  # Optional local AI container for testing the self-healing scraper engine.
  # Start with: docker compose --profile ai up
  # First run pulls the model (cached to a named volume — subsequent starts are fast).
  ollama:
    image: ollama/ollama:0.30.6
    profiles: [ai]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama serve & until ollama list > /dev/null 2>&1; do sleep 1; done && ollama pull ${OLLAMA_MODEL:-llama3.2}; wait"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-41ddf2d6dfad63f18a7fa42d4ddc82da47fd7ac0f9e6c55530078f7c2ca941c2}
      LOG_FORMAT: json
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
        - action: rebuild
          path: ./apps/web/package.json

  # ── Observability stack (--profile obs) ────────────────────────────────────
  # Start with: docker compose --profile obs up   (or: make up-obs)
  # Grafana UI: http://localhost:3003  (anonymous admin, no login required)

  loki:
    image: grafana/loki:3.3.2
    profiles: [obs]
    restart: unless-stopped
    ports:
      # Bound to localhost only — log data should not be exposed on shared networks
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki:/etc/loki:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  alloy:
    image: grafana/alloy:v1.4.3
    profiles: [obs]
    restart: unless-stopped
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    volumes:
      - ./docker/alloy:/etc/alloy:ro
      - alloy_data:/var/lib/alloy
      # Docker socket mounted read-only so Alloy can tail container log streams.
      # This is a local development stack only — do not expose this setup on shared networks.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # ── SaaS provider secrets ────────────────────────────────────────────────
    # API keys for optional SaaS exporters are injected here at collector startup.
    # Application code never sees these variables — they live only in this service.
    # Set the variable in a local .env file or export it in your shell before
    # running `docker compose --profile obs up`.
    #
    # To enable one or more SaaS providers, uncomment the single `environment:`
    # block below and add the keys for each provider you want to activate.
    # YAML requires exactly one `environment:` key per service — do not add a
    # second block; add new variables inside this block instead.
    #
    # environment:
    #   # Better Stack — uncomment when enabling loki.write.better_stack in config.alloy
    #   BETTER_STACK_SOURCE_TOKEN: ${BETTER_STACK_SOURCE_TOKEN:-}
    #   #
    #   # Grafana Cloud Loki — uncomment when enabling loki.write.grafana_cloud in config.alloy
    #   GRAFANA_CLOUD_LOKI_URL:  ${GRAFANA_CLOUD_LOKI_URL:-}
    #   GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:-}
    #   GRAFANA_CLOUD_API_KEY:   ${GRAFANA_CLOUD_API_KEY:-}
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:12345/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [obs]
    restart: unless-stopped
    ports:
      # Bound to localhost only — metrics data should not be exposed on shared networks
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    # Prometheus scrapes the API container by DNS name — wait until it's healthy
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:11.3.0
    profiles: [obs]
    restart: unless-stopped
    ports:
      # Bound to localhost only — anonymous admin access is intentional for local dev
      - "127.0.0.1:3003:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

volumes:
  postgres_data:
  valkey_data:
  meilisearch_data_v1_45:
  ollama_data:
  loki_data:
  alloy_data:
  grafana_data:
  prometheus_data:
