services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wav
      POSTGRES_PASSWORD: wav
      POSTGRES_DB: wav_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wav -d wav_search"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wav_master_key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    environment:
      DATABASE_URL: postgresql://wav:wav@postgres:5432/wav_search
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://wav:wav@postgres:5432/wav_search
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: wav_master_key
      VALKEY_URL: redis://valkey:6379
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_REQUIRED: ${OLLAMA_REQUIRED:-false}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3002
    depends_on:
      migrate:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      valkey:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: rebuild
          path: ./apps/api/package.json

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://wav:wav@postgres:5432/wav_search
      QUEUE_REDIS_URL: redis://valkey:6379
      SCRAPER_CONCURRENCY: 2
      SCRAPER_HEADLESS: "true"
      # Docker service name resolves automatically — no user config needed
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/scraper/src
          target: /app/apps/scraper/src
        - action: rebuild
          path: ./apps/scraper/package.json

  # Optional local AI container for testing the self-healing scraper engine.
  # Start with: docker compose --profile ai up
  # First run pulls the model (cached to a named volume — subsequent starts are fast).
  ollama:
    image: ollama/ollama
    profiles: [ai]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama serve & until ollama list > /dev/null 2>&1; do sleep 1; done && ollama pull ${OLLAMA_MODEL:-llama3.2}; wait"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
        - action: rebuild
          path: ./apps/web/package.json

volumes:
  postgres_data:
  valkey_data:
  meilisearch_data:
  ollama_data:
