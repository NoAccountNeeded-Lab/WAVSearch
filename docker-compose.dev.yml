x-dev-volumes: &dev-volumes
  - .:/workspace
  # Keep Linux dependency links and generated binaries out of the host checkout.
  - dev_root_node_modules:/workspace/node_modules
  - dev_api_node_modules:/workspace/apps/api/node_modules
  - dev_scraper_node_modules:/workspace/apps/scraper/node_modules
  - dev_web_node_modules:/workspace/apps/web/node_modules
  - dev_agents_node_modules:/workspace/packages/agents/node_modules
  - dev_charts_node_modules:/workspace/packages/charts/node_modules
  - dev_config_node_modules:/workspace/packages/config/node_modules
  - dev_db_node_modules:/workspace/packages/db/node_modules
  - dev_types_node_modules:/workspace/packages/types/node_modules

x-dev-environment: &dev-environment
  NODE_ENV: development
  # API
  PORT: 3001
  HOST: 0.0.0.0
  CORS_ORIGIN: http://localhost:3000
  # Backing services are resolved by Docker Compose service name.
  DATABASE_URL: postgresql://wav:wav@postgres:5432/wav_search
  MEILISEARCH_HOST: http://meilisearch:7700
  MEILISEARCH_API_KEY: wav_master_key
  VALKEY_URL: redis://valkey:6379
  # Web uses the service URL for server-side rendering and localhost for browser fetches.
  API_INTERNAL_URL: http://api:3001
  NEXT_PUBLIC_API_URL: http://localhost:3001
  # Disable Turbo TUI; it does not render well in non-interactive container logs.
  TURBO_UI: "false"
  # Optional AI provider secrets forwarded from the host shell when present.
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  # Docker service name resolves automatically; override for a non-Docker Ollama install.
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
  # Uncomment if hot reload stops detecting file changes on your machine:
  # WATCHPACK_POLLING: "true"   # Next.js
  # CHOKIDAR_USEPOLLING: "true" # other watchers

x-dev-service: &dev-service
  build:
    context: .
    dockerfile: docker/dev.Dockerfile
  volumes: *dev-volumes
  working_dir: /workspace
  environment: *dev-environment

services:
  deps:
    <<: *dev-service
    restart: "no"
    command: sh -c "pnpm install --frozen-lockfile && pnpm db:generate"

  workspace:
    <<: *dev-service
    restart: unless-stopped
    command: sleep infinity
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  api:
    <<: *dev-service
    restart: unless-stopped
    command: pnpm --filter @wav-search/api dev
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  web:
    <<: *dev-service
    restart: unless-stopped
    command: pnpm --filter @wav-search/web dev
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started

  scraper:
    <<: *dev-service
    restart: unless-stopped
    command: pnpm --filter @wav-search/scraper dev
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # Inherit and override the base ollama service for dev; same image, same volume.
  ollama:
    profiles: [ai]

volumes:
  dev_root_node_modules:
  dev_api_node_modules:
  dev_scraper_node_modules:
  dev_web_node_modules:
  dev_agents_node_modules:
  dev_charts_node_modules:
  dev_config_node_modules:
  dev_db_node_modules:
  dev_types_node_modules:
