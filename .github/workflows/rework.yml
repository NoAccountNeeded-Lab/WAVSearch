name: AI Rework Advisor

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  rework:
    if: >
      github.event.label.name == 'status:needs-changes' ||
      github.event.label.name == 'status:qa-failed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/checkout@v4

      - run: pip install anthropic==0.40.0 openai httpx

      - name: Generate rework plan and post comment
        env:
          AGENTS_PROVIDER: ${{ vars.AGENTS_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AGENTS_OLLAMA_BASE_URL: ${{ vars.AGENTS_OLLAMA_BASE_URL || 'http://localhost:11434' }}
          AGENTS_GITHUB_MODEL: ${{ vars.AGENTS_GITHUB_MODEL || 'gpt-4o-mini' }}
          AGENTS_ANTHROPIC_MODEL: ${{ vars.AGENTS_ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          AGENTS_OPENAI_MODEL: ${{ vars.AGENTS_OPENAI_MODEL || 'gpt-4o-mini' }}
          AGENTS_OLLAMA_MODEL: ${{ vars.AGENTS_OLLAMA_MODEL || 'qwen2.5-coder:7b' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
        run: python .github/scripts/rework.py
