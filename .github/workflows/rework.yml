name: AI Rework Advisor

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  rework:
    if: >
      github.event.label.name == 'status:needs-changes' ||
      github.event.label.name == 'status:qa-failed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/checkout@v4

      - run: pip install anthropic==0.40.0

      - name: Generate rework plan and post comment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
        run: python .github/scripts/rework.py
