name: AI Issue Developer

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  develop-issue:
    if: github.event.label.name == 'status:ready'

    # Runs on the self-hosted Mac — uses Claude Code (existing subscription).
    # If the runner is offline the job queues and runs when the Mac comes back online.
    runs-on: self-hosted

    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity for bot commits
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run issue developer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/issue_developer.py
