name: Agent Intake

on:
  workflow_dispatch:
    inputs:
      agent_login:
        description: GitHub login for assigned-issue lookup. Defaults to the workflow actor.
        required: false
      role:
        description: Agent lane to prefer.
        required: false
        default: developer
        type: choice
        options:
          - developer
          - accessibility
          - qa
          - designer
          - release
      dry_run:
        description: Do not comment or label, just report the selected issue.
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  select-work:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Select issue and check in
        uses: actions/github-script@v8
        env:
          AGENT_LOGIN: ${{ inputs.agent_login }}
          AGENT_ROLE: ${{ inputs.role }}
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const role = process.env.AGENT_ROLE || 'developer';
            const agentLogin = process.env.AGENT_LOGIN || context.actor;
            const dryRun = process.env.DRY_RUN === 'true';
            const roleLabel = `agent:${role}`;
            const terminalStatuses = new Set([
              'status:in-progress',
              'status:needs-review',
              'status:needs-changes',
              'status:needs-qa',
              'status:qa-failed',
              'status:qa-passed',
              'status:stuck',
            ]);

            const listIssues = async query => {
              const { data } = await github.rest.search.issuesAndPullRequests({
                q: query,
                per_page: 20,
              });
              return data.items.filter(item => !item.pull_request);
            };

            const assigned = await listIssues(
              `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open assignee:${agentLogin}`,
            );
            const assignedOpen = assigned.filter(issue => {
              const labels = issue.labels.map(label => label.name);
              return !labels.some(label => terminalStatuses.has(label));
            });

            const unassigned = assignedOpen.length
              ? []
              : await listIssues(
                  `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open no:assignee label:status:ready`,
                );

            const issue = assignedOpen[0] || unassigned.find(candidate => {
              const labels = candidate.labels.map(label => label.name);
              return labels.includes(roleLabel) || !labels.some(label => label.startsWith('agent:'));
            });

            if (!issue) {
              core.notice(`No issue found for ${agentLogin} (${role}).`);
              return;
            }

            core.notice(`Selected #${issue.number}: ${issue.title}`);
            core.summary
              .addHeading('Agent intake')
              .addRaw(`Selected issue: #${issue.number} ${issue.title}\n`)
              .addRaw(`Agent login: ${agentLogin}\n`)
              .addRaw(`Role: ${role}\n`)
              .addRaw(`Dry run: ${dryRun}\n`)
              .write();

            if (dryRun) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['status:in-progress', roleLabel],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `Agent intake check-in for @${agentLogin}.`,
                '',
                `Role: ${role}`,
                `Selected: #${issue.number}`,
                '',
                'Next step: create an issue branch, inspect acceptance criteria, and open a draft PR when the first implementation pass is ready.',
              ].join('\n'),
            });
