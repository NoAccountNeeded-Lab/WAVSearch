name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api (builder stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          target: builder
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build scraper (builder stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/scraper.Dockerfile
          target: builder
          push: false
          cache-from: type=gha,scope=scraper
          cache-to: type=gha,mode=max,scope=scraper

      - name: Build web (builder stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          target: builder
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/migrate.Dockerfile
          push: false
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: wav
          POSTGRES_PASSWORD: wav
          POSTGRES_DB: wivwav
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wav -d wivwav"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://wav:wav@localhost:5432/wivwav

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Check for schema drift
        # Migrations were just applied, so the live DB reflects accumulated migration state.
        # Diff the DB against schema.prisma — any mismatch means a migration file is missing.
        # Fix locally: pnpm db:migrate:create --name <description>
        run: |
          pnpm --filter @wivwav/db exec prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel ./prisma/schema.prisma \
            --exit-code

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
