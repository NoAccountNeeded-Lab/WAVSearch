labels:
  - name: status:ready
    color: 'c2e0c6'
    description: Ready for an agent or human to pick up
  - name: status:in-progress
    color: '0075ca'
    description: Agent or human is working on this
  - name: status:needs-review
    color: 'fbca04'
    description: Ready for code review
  - name: status:needs-changes
    color: 'e4e669'
    description: Review requested changes
  - name: status:stuck
    color: 'b60205'
    description: Human input is required
  - name: bug
    color: 'ee0701'
    description: Something isn't working
  - name: cleanup
    color: 'fef2c0'
    description: Code or process cleanup
  - name: documentation
    color: '0075ca'
    description: Documentation changes
  - name: enhancement
    color: '84b6eb'
    description: New feature or improvement
  - name: infrastructure
    color: '1d76db'
    description: Infrastructure or CI/CD changes
