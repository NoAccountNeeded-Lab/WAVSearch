name: Bug
description: Report broken behavior
title: 'fix: '
labels: ['bug', 'status:ready']
body:
  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: User impact, severity, affected service, or data risk.
  - type: textarea
    id: qa
    attributes:
      label: Verification notes
      description: How should QA prove the fix works?
