name: Feature
description: Request a user-facing or system feature
title: 'feat: '
labels: ['enhancement', 'status:ready']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What should improve and who benefits?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that make this done.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: checkboxes
    id: areas
    attributes:
      label: Affected areas
      options:
        - label: Web
        - label: API
        - label: Scraper
        - label: Data model
        - label: Infrastructure
        - label: Documentation
        - label: Accessibility
        - label: Design or brand
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What this issue explicitly will NOT do.
  - type: textarea
    id: validation
    attributes:
      label: Validation expectations
      description: Commands, steps, or environments that prove each acceptance criterion is met.
      placeholder: |
        - `pnpm test` passes
        - Manually verify at /path that X works
        - Screenshot attached showing Y
  - type: textarea
    id: qa
    attributes:
      label: QA notes
      description: Manual checks, seed data, screenshots, or environments needed.
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility expectations
      description: Required keyboard, screen reader, contrast, mobile, or reduced-motion behavior.
