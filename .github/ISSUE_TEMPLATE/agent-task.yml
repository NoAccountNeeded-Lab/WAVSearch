name: Agent task
description: Work item intended for an AI or automation agent
title: 'chore: '
labels: ['status:ready']
body:
  - type: dropdown
    id: preferred-agent
    attributes:
      label: Preferred agent lane
      options:
        - developer
        - accessibility
        - qa
        - designer
        - release
        - any
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should the agent accomplish?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Provider, files, scope, dependencies, or known risks.
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What the agent should explicitly NOT do.
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Checks that prove the task is complete.
    validations:
      required: true
