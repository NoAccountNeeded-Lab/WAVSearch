packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true

minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.9.17'
  - '@turbo/darwin-arm64@2.9.17'
  - '@turbo/linux-64@2.9.17'
  - '@turbo/linux-arm64@2.9.17'
  - '@turbo/windows-64@2.9.17'
  - '@turbo/windows-arm64@2.9.17'
  - turbo@2.9.17
